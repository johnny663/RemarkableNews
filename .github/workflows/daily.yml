name: Daily news to reMarkable

on:
  schedule:
    # GitHub cron is UTC and can't follow DST. Scheduled runs are
    # best-effort and drift badly under load (observed 2.5-4h late), so we
    # aim well before the 5am ET target and use off-hour minutes, which
    # drift less than the congested :00 slots.
    # 7:23 UTC = 3:23am EDT / 2:23am EST — lands ~5am ET after typical drift
    - cron: "23 7 * * *"
    # 7:53 UTC = 3:53am EDT / 2:53am EST — second chance, same reasoning
    - cron: "53 7 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

# Never run two jobs at once: each run restores and *rotates* the OneDrive
# refresh token via the Actions cache, so overlapping runs would rotate it
# out from under each other and save a stale cache as the newest entry.
# Queued (not cancelled) so a delayed first run doesn't kill the second.
concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # Headless Chromium for resolving the Daily Press edition GUID.
      - run: python -m playwright install --with-deps chromium

      # Persist the OneDrive token cache across runs. The refresh token rotates
      # on each use, so each run restores the newest cache and saves an updated
      # one (unique key + prefix restore-keys = rolling persistence, no secrets
      # committed to the repo).
      - name: Restore OneDrive token cache
        uses: actions/cache@v4
        with:
          path: ~/.remarkableNews
          key: msal-token-${{ github.run_id }}
          restore-keys: |
            msal-token-

      # Seed the cache from the secret whenever the restored file is missing,
      # empty, or not valid JSON. This self-heals a corrupt cache that a prior
      # failed run may have saved (otherwise it gets restored forever).
      - name: Seed token cache (if missing or invalid)
        run: |
          mkdir -p ~/.remarkableNews
          f=~/.remarkableNews/token_cache.json
          if ! python -c "import json,sys; json.load(open(sys.argv[1]))" "$f" 2>/dev/null; then
            printf '%s' "$MSAL_TOKEN_CACHE" > "$f"
            echo "Seeded token cache from secret."
          else
            echo "Restored a valid token cache from the previous run."
          fi
          # Fail early with a clear message if the secret itself is bad
          python -c "import json,sys; d=json.load(open(sys.argv[1])); assert d.get('RefreshToken'), 'no RefreshToken in cache'; print('Token cache OK')" "$f"
        env:
          MSAL_TOKEN_CACHE: ${{ secrets.MSAL_TOKEN_CACHE }}

      - name: Run pipeline
        run: python main.py
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
